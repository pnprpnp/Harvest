<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>レタス収穫ナビ</title>

<style>

body{
font-family:-apple-system;
margin:0;
background:#eef2f3;
}

header{
background:#27ae60;
color:white;
text-align:center;
padding:18px;
font-size:24px;
font-weight:bold;
}

.container{
padding:14px;
}

.card{
background:white;
border-radius:16px;
padding:16px;
margin-bottom:14px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

label{
font-size:14px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin-top:4px;
margin-bottom:8px;
}

button{
width:100%;
padding:16px;
font-size:20px;
margin-top:10px;
border:none;
border-radius:12px;
background:#27ae60;
color:white;
font-weight:bold;
}

.startBox{
text-align:center;
font-size:22px;
font-weight:bold;
padding:10px;
background:#ecfdf5;
border-radius:10px;
}

.details{
display:none;
margin-top:10px;
}

.bedGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.bed{
background:white;
border-radius:14px;
padding:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.bedTitle{
text-align:center;
font-size:18px;
font-weight:bold;
margin-bottom:6px;
}

.palletGrid{
display:grid;
grid-template-columns:1fr;
gap:4px;
}

.pallet{
height:18px;
background:#d1d5db;
border-radius:4px;
}

.start{background:#22c55e;}
.mid{background:#fde047;}
.end{background:#ef4444;}

</style>
</head>

<body>

<header>🥬 レタス収穫ナビ</header>

<div class="container">

<div class="card">

<label>出荷ケース</label>
<input id="cases" type="number">

<label>収穫率 (%)</label>
<input id="rate" type="number" value="100">

<div class="startBox">
開始位置: <span id="startLabel">A-1</span>
</div>

<button onclick="calc()">収穫計算</button>

<button onclick="toggleDetails()" style="background:#6b7280">
詳細設定
</button>

<div id="details" class="details"></div>

</div>

<div class="bedGrid">

<div id="Fbed" class="bed"></div>
<div id="Dbed" class="bed"></div>
<div id="Bbed" class="bed"></div>

<div id="Ebed" class="bed"></div>
<div id="Cbed" class="bed"></div>
<div id="Abed" class="bed"></div>

</div>

</div>

<script>

const order=["A","B","C","D","E","F"]
const bedMap=["F","D","B","E","C","A"]

let startBed="A"
let startPallet=1

function toggleDetails(){

let d=document.getElementById("details")

d.style.display=d.style.display=="block"?"none":"block"

}

function drawSettings(){

let html=""

order.forEach(b=>{

html+=`
<h3>${b}ベット</h3>

<label>手前パレット数</label>
<input id="${b}_split" type="number" value="30">

<label>手前収穫数</label>
<input id="${b}_front" type="number" value="20">

<label>奥収穫数</label>
<input id="${b}_back" type="number" value="16">
`

})

document.getElementById("details").innerHTML=html

}

drawSettings()

function drawBeds(){

bedMap.forEach(b=>{

let html="<div class='bedTitle'>"+b+"</div><div class='palletGrid'>"

for(let i=1;i<=20;i++){

html+=`<div class="pallet" onclick="setStart('${b}',${i})" id="${b}-${i}"></div>`

}

html+="</div>"

document.getElementById(b+"bed").innerHTML=html

})

}

drawBeds()

function setStart(b,p){

startBed=b
startPallet=p

document.getElementById("startLabel").innerText=b+"-"+p

}

function getYield(b,p){

let split=Number(document.getElementById(b+"_split").value)
let front=Number(document.getElementById(b+"_front").value)
let back=Number(document.getElementById(b+"_back").value)

if(p<=split) return front
return back

}

function reset(){

document.querySelectorAll(".pallet").forEach(p=>{
p.className="pallet"
})

}

function calc(){

reset()

let cases=Number(document.getElementById("cases").value)
let rate=Number(document.getElementById("rate").value)/100

let need=cases*12/rate

let bedIndex=order.indexOf(startBed)
let palletIndex=startPallet

let total=0
let first=true
let lastId=null

while(total<need){

let bed=order[bedIndex]
let yield=getYield(bed,palletIndex)

let id=bed+"-"+palletIndex
let el=document.getElementById(id)

if(el){

lastId=id

if(first){
el.classList.add("start")
first=false
}else{
el.classList.add("mid")
}

}

total+=yield

palletIndex++

if(palletIndex>78){

palletIndex=1
bedIndex++

if(bedIndex>=order.length)
bedIndex=0

}

}

if(lastId){

let e=document.getElementById(lastId)
e.classList.remove("mid")
e.classList.add("end")

}

}

</script>

</body>
</html>
