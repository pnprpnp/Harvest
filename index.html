<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<link rel="manifest" href="manifest.json">

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🥬 収穫ナビ</title>

<style>
.frontZone{background:#bbf7d0 !important;}  /* 手前 */
.backZone{background:#fecaca !important;}   /* 奥 */

body{font-family:-apple-system; margin:0; background:#eef2f3;}
header{background:#22c55e;color:white;text-align:center;padding:18px;font-size:24px;font-weight:bold;}
.container{padding:14px;}
.card{background:white;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 3px 8px rgba(0,0,0,0.08);}
label{font-weight:bold;font-size:14px;}

/* 入力欄を短く中央寄せ */
input{
    width:80%;
    max-width:300px;
    display:block;
    margin:0 auto 10px auto;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{width:100%;padding:14px;font-size:18px;border:none;border-radius:10px;background:#22c55e;color:white;margin-top:8px;}
.secondary{background:#6b7280;}
.third{background:#2563eb;}
.startBox{font-size:20px;font-weight:bold;text-align:center;padding:10px;background:#ecfdf5;border-radius:10px;margin-top:8px;}
.bedGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.bed{background:white;border-radius:12px;padding:8px;box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.bedTitle{text-align:center;font-weight:bold;margin-bottom:6px;}
.palletGrid{display:grid;grid-template-columns:1fr;gap:3px;}
.pallet{height:10px;border-radius:3px;}
.palletEven{background:#d1d5db;}
.palletOdd{background:#f3f4f6;}
.middleMark{background:#a78bfa;}
.start{background:#22c55e !important;}
.mid{background:#fde047 !important;}
.end{background:#ef4444 !important;}
.startSelect{background:#3b82f6 !important;}
</style>
</head>

<body>
<header>🥬 収穫ナビ</header>

<div class="container">

<div class="card">
<label>出荷ケース</label>
<input id="cases" type="number">
<label>収穫率 (%)</label>
<input id="rate" type="number" value="100">

<div class="startBox">
開始位置: <span id="startLabel">A-1</span><br>
終了位置: <span id="endLabel">-</span>
</div>

<button onclick="calc()">収穫計算</button>
<button class="secondary" onclick="toggleDetail1()">詳細設定</button>
<button class="secondary" onclick="toggleDetail2()">さらに詳細設定</button>
<button class="third" onclick="saveSettings()">設定保存</button>

<div id="detail1"></div>
<div id="detail2"></div>
</div>

<div class="bedGrid">
<div id="Fbed" class="bed"></div>
<div id="Dbed" class="bed"></div>
<div id="Bbed" class="bed"></div>
<div id="Ebed" class="bed"></div>
<div id="Cbed" class="bed"></div>
<div id="Abed" class="bed"></div>
</div>

</div>

<script>
const order=["A","B","C","D","E","F"];
const bedMap=["F","D","B","E","C","A"];

let startBed="A";
let startPallet=1;
let detail1=false;
let detail2=false;

function toggleDetail1(){detail1=!detail1; drawSettings();}
function toggleDetail2(){detail2=!detail2; drawSettings();}

function drawSettings(){
let html1="", html2="";

if(detail1){
order.forEach(b=>{
html1+=`<h3>${b}ベット</h3>
<label>1パレット収穫数</label>
<input id="${b}_single" type="number" value="20" oninput="drawBeds()">`
})
}

if(detail2){
order.forEach(b=>{
html2+=`<h3>${b}ベット</h3>

<div style="margin-bottom:10px;">
  <label style="display:block;">
    <input type="checkbox" id="${b}_useSplit" onchange="drawBeds()">
    手前奥計算を使う
  </label>
</div>

<div style="margin-bottom:10px;">
  <label style="display:block;">手前パレット数</label>
  <input id="${b}_split" type="number" value="30" oninput="drawBeds()">
</div>

<div style="margin-bottom:10px;">
  <label style="display:block;">手前収穫数</label>
  <input id="${b}_front" type="number" value="20" oninput="drawBeds()">
</div>

<div style="margin-bottom:10px;">
  <label style="display:block;">奥収穫数</label>
  <input id="${b}_back" type="number" value="16" oninput="drawBeds()">
</div>
`
})
}

function drawBeds(){
bedMap.forEach(b=>{
let html="<div class='bedTitle'>"+b+"</div><div class='palletGrid'>";

let useSplit=document.getElementById(b+"_useSplit");
let split=useSplit && useSplit.checked 
    ? Number(document.getElementById(b+"_split").value)/2 
    : 0;

for(let i=39;i>=1;i--){
let cls="pallet";

if(i % 2 == 0) cls+=" palletEven"; else cls+=" palletOdd";
let middle = Math.ceil(39 / 2);  // 中央を自動計算

if(i == middle) cls += " middleMark";

/* 手前奥色分け */
if(useSplit && useSplit.checked){
    if(i<=split){ cls+=" frontZone"; }
    else{ cls+=" backZone"; }
}

html+=`<div class="${cls}" onclick="setStart('${b}',${i})" id="${b}-${i}"></div>`;
}
html+="</div>";
document.getElementById(b+"bed").innerHTML=html;
})
}

function setStart(b,p){
document.querySelectorAll(".startSelect").forEach(el=>{el.classList.remove("startSelect")})
let el=document.getElementById(b+"-"+p)
if(el) el.classList.add("startSelect")
startBed=b; startPallet=p;
document.getElementById("startLabel").innerText=b+"-"+p
}

function getYield(b,p){
let useSplit=document.getElementById(b+"_useSplit")
if(useSplit && useSplit.checked){
let split=Number(document.getElementById(b+"_split").value) / 2  // ←ここ追加
let front=Number(document.getElementById(b+"_front").value)
let back=Number(document.getElementById(b+"_back").value)
return p<=split ? front : back
}
let single=document.getElementById(b+"_single")
return single ? Number(single.value) : 20
}

function reset(){
document.querySelectorAll(".pallet").forEach(p=>{
p.classList.remove("start","mid","end","startSelect")
})
}

function calc(){
reset()
let cases=Number(document.getElementById("cases").value)
let rate=Number(document.getElementById("rate").value)/100
let need=cases*12/rate
let bedIndex=order.indexOf(startBed)
let palletIndex=startPallet
let total=0
let first=true
let lastId=null
while(total<need){
let bed=order[bedIndex]
let yield=getYield(bed,palletIndex)*2
let id=bed+"-"+palletIndex
let el=document.getElementById(id)
if(el){lastId=id; if(first){el.classList.add("start"); first=false}else{el.classList.add("mid")}}
total+=yield
palletIndex++
if(palletIndex>39){palletIndex=1; bedIndex++; if(bedIndex>=order.length) bedIndex=0}
}
if(lastId){let e=document.getElementById(lastId); e.classList.remove("mid"); e.classList.add("end")
document.getElementById("endLabel").innerText=lastId}
}

function saveSettings(){
let data={cases:document.getElementById("cases").value,rate:document.getElementById("rate").value,startBed:startBed,startPallet:startPallet,beds:{}}
order.forEach(b=>{
let single=document.getElementById(b+"_single"),split=document.getElementById(b+"_split"),
front=document.getElementById(b+"_front"),back=document.getElementById(b+"_back"),
useSplit=document.getElementById(b+"_useSplit")
data.beds[b]={single:single?single.value:20,split:split?split.value:30,front:front?front.value:20,back:back?back.value:16,useSplit:useSplit?useSplit.checked:false}
})
localStorage.setItem("lettuceApp",JSON.stringify(data))
alert("設定保存しました")
}

function loadSettings(){
let data=localStorage.getItem("lettuceApp"); if(!data) return
data=JSON.parse(data)
document.getElementById("cases").value=data.cases
document.getElementById("rate").value=data.rate
startBed=data.startBed
startPallet=data.startPallet
document.getElementById("startLabel").innerText=startBed+"-"+startPallet
if(data.beds){
order.forEach(b=>{
let s=document.getElementById(b+"_single"),sp=document.getElementById(b+"_split"),
f=document.getElementById(b+"_front"),ba=document.getElementById(b+"_back"),u=document.getElementById(b+"_useSplit")
if(s) s.value=data.beds[b].single
if(sp) sp.value=data.beds[b].split
if(f) f.value=data.beds[b].front
if(ba) ba.value=data.beds[b].back
if(u) u.checked=data.beds[b].useSplit
})
}
}

window.onload=()=>{
    loadSettings();
    drawBeds(); // ← これ追加
}
</script>

</body>
</html>
