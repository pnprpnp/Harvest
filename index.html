<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🥬 収穫ナビ 高機能版 手前奥対応 逆算</title>

<style>
.frontZone{background:#bbf7d0 !important;}
.backZone{background:#fecaca !important;}
body{font-family:-apple-system; margin:0; background:#eef2f3;}
header{background:#22c55e;color:white;text-align:center;padding:18px;font-size:24px;font-weight:bold;}
.container{padding:14px;}
.card{background:white;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 3px 8px rgba(0,0,0,0.08);}
label{font-weight:bold;font-size:14px;}
input{width:80%; max-width:300px; display:block; margin:0 auto 10px auto; padding:12px; font-size:16px; border-radius:8px; border:1px solid #ccc;}
button{width:100%;padding:14px;font-size:18px;border:none;border-radius:10px;background:#22c55e;color:white;margin-top:8px;}
.secondary{background:#6b7280;}
.third{background:#2563eb;}
.startBox{text-align:center;font-weight:bold;font-size:18px;margin-top:10px;}
.bedGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.bed{background:white;border-radius:12px;padding:8px;}
.bedTitle{text-align:center;font-weight:bold;margin-bottom:6px;}
.pallet{height:8px;border-radius:3px;margin:2px 0;}
.palletEven{background:#d1d5db;}
.palletOdd{background:#f3f4f6;}
.startSelect{background:#3b82f6 !important;}
.endSelect{background:#f97316 !important;}
.range{background:#fde047 !important;}
.notice{display:none;color:#dc2626;font-size:13px;margin-top:4px;}
</style>
</head>

<body>
<header>🥬 収穫ナビ 高機能版 手前奥対応</header>
<div class="container">

<div class="card">
<label>出荷ケース</label>
<input id="cases" type="number">
<label>収穫率 (%)</label>
<input id="rate" type="number" value="100">

<div class="startBox">
開始: <span id="startLabel">-</span><br>
終了: <span id="endLabel">-</span>
</div>

<button onclick="calc()">収穫計算</button>
<button class="secondary" onclick="toggleDetail1()">詳細設定</button>
<button class="secondary" onclick="toggleDetail2()">さらに詳細設定</button>
<button class="third" onclick="saveSettings()">設定保存</button>
<button class="third" style="margin-top:4px;background:#f59e0b;" onclick="startReverse()">収穫率逆算モード</button>

<div id="detail1"></div>
<div id="detail2"></div>
</div>

<div class="bedGrid">
<div id="Fbed" class="bed"></div>
<div id="Dbed" class="bed"></div>
<div id="Bbed" class="bed"></div>
<div id="Ebed" class="bed"></div>
<div id="Cbed" class="bed"></div>
<div id="Abed" class="bed"></div>
</div>
</div>

<script>
const order=["A","B","C","D","E","F"];
const bedMap=["F","D","B","E","C","A"];

let startBed=null, startPallet=null;
let endBed=null, endPallet=null;
let detail1=false, detail2=false;
let reverseMode=false;

function toggleDetail1(){detail1=!detail1; drawSettings();}
function toggleDetail2(){detail2=!detail2; drawSettings();}

function drawSettings(){
let html1="", html2="";
if(detail1){
order.forEach(b=>{
html1+=`<h3>${b}ベット</h3>
<label>1パレット収穫数</label>
<input id="${b}_single" type="number" value="20" oninput="drawBeds()">`
})}
if(detail2){
order.forEach(b=>{
html2+=`<h3>${b}ベット</h3>
<div style="margin-bottom:10px;">
<label style="display:block;">
<input type="checkbox" id="${b}_useSplit" onchange="drawBeds()">手前奥計算を使う
</label>
<div id="${b}_notice" class="notice">
※手前奥計算が有効のため、詳細設定より優先
</div></div>
<label>手前パレット数</label>
<input id="${b}_split" type="number" value="30" oninput="drawBeds()">
<label>手前収穫数</label>
<input id="${b}_front" type="number" value="20" oninput="drawBeds()">
<label>奥収穫数</label>
<input id="${b}_back" type="number" value="16" oninput="drawBeds()">`
})}
document.getElementById("detail1").innerHTML=html1;
document.getElementById("detail2").innerHTML=html2;
setTimeout(()=>{loadSettings(); drawBeds();},0);
}

function drawBeds(){
bedMap.forEach(b=>{
let html="<div class='bedTitle'>"+b+"</div>";
for(let i=39;i>=1;i--){
let cls="pallet";
cls+=(i%2==0)?" palletEven":" palletOdd";
let useSplit=document.getElementById(b+"_useSplit");
if(useSplit && useSplit.checked){
let split=Number(document.getElementById(b+"_split").value)/2;
cls += (i<=split) ? " frontZone":" backZone";
}
html+=`<div class="${cls}" id="${b}-${i}" onclick="tap('${b}',${i})"></div>`;
}
document.getElementById(b+"bed").innerHTML=html;
})
}

function tap(b,p){
if(reverseMode){
if(!startBed){startBed=b; startPallet=p;document.getElementById("startLabel").innerText=b+"-"+p;document.getElementById(b+"-"+p).classList.add("startSelect"); return;}
if(!endBed){endBed=b; endPallet=p;document.getElementById("endLabel").innerText=b+"-"+p;document.getElementById(b+"-"+p).classList.add("endSelect"); paintRange(); calcRate(); reverseMode=false; return;}
}
}

function startReverse(){
reset(); reverseMode=true; startBed=null; endBed=null; startPallet=null; endPallet=null;
document.getElementById("startLabel").innerText="-"; document.getElementById("endLabel").innerText="-";
alert("開始→終了の順でタップしてください");
}

function paintRange(){
let bedIndex=order.indexOf(startBed); let palletIndex=startPallet;
while(true){
let id=order[bedIndex]+"-"+palletIndex; let el=document.getElementById(id);
if(el && !el.classList.contains("startSelect") && !el.classList.contains("endSelect")) el.classList.add("range");
if(order[bedIndex]==endBed && palletIndex==endPallet) break;
palletIndex++; if(palletIndex>39){palletIndex=1; bedIndex++; if(bedIndex>=order.length) bedIndex=0;}
}
}

function getYield(b,p){
let useSplit=document.getElementById(b+"_useSplit");
if(useSplit && useSplit.checked){
let split=Number(document.getElementById(b+"_split").value)/2;
let front=Number(document.getElementById(b+"_front").value);
let back=Number(document.getElementById(b+"_back").value);
return p<=split?front:back;
}
let single=document.getElementById(b+"_single");
return single?Number(single.value):20;
}

function calcRate(){
let cases=Number(document.getElementById("cases").value);
if(!cases){alert("ケース数を入力してください"); return;}
let bedIndex=order.indexOf(startBed); let palletIndex=startPallet; let total=0;
while(true){ total+=getYield(order[bedIndex],palletIndex)*2; if(order[bedIndex]==endBed && palletIndex==endPallet) break;
palletIndex++; if(palletIndex>39){ palletIndex=1; bedIndex++; if(bedIndex>=order.length) bedIndex=0;} }
let rate=(cases*12)/total*100;
alert("収穫率："+rate.toFixed(1)+"%");
}

function reset(){document.querySelectorAll(".pallet").forEach(p=>p.classList.remove("startSelect","endSelect","range"));}
function calc(){alert("通常収穫計算は逆算モードOFFで使用してください");}

function saveSettings(){
let data={cases:document.getElementById("cases").value, rate:document.getElementById("rate").value, startBed,startPallet,beds:{}};
order.forEach(b=>{data.beds[b]={single:document.getElementById(b+"_single")?.value||20, split:document.getElementById(b+"_split")?.value||30, front:document.getElementById(b+"_front")?.value||20, back:document.getElementById(b+"_back")?.value||16, useSplit:document.getElementById(b+"_useSplit")?.checked||false};})
localStorage.setItem("lettuceApp",JSON.stringify(data)); alert("設定保存しました");}

function loadSettings(){
let data=localStorage.getItem("lettuceApp"); if(!data) return; data=JSON.parse(data);
document.getElementById("cases").value=data.cases; document.getElementById("rate").value=data.rate;
startBed=data.startBed; startPallet=data.startPallet; document.getElementById("startLabel").innerText=startBed+"-"+startPallet;
order.forEach(b=>{let d=data.beds?.[b]; if(!d) return;
if(document.getElementById(b+"_single")) document.getElementById(b+"_single").value=d.single;
if(document.getElementById(b+"_split")) document.getElementById(b+"_split").value=d.split;
if(document.getElementById(b+"_front")) document.getElementById(b+"_front").value=d.front;
if(document.getElementById(b+"_back")) document.getElementById(b+"_back").value=d.back;
if(document.getElementById(b+"_useSplit")) document.getElementById(b+"_useSplit").checked=d.useSplit;
});}

window.onload=()=>{drawSettings();}
</script>
</body>
</html>
