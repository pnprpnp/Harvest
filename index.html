<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>レタス収穫ナビ</title>

<style>

body{
font-family:-apple-system;
margin:0;
background:#f2f2f7;
}

header{
background:#27ae60;
color:white;
text-align:center;
padding:16px;
font-size:22px;
font-weight:bold;
}

.container{
padding:16px;
}

.card{
background:white;
border-radius:14px;
padding:16px;
margin-bottom:16px;
}

label{
font-size:14px;
margin-top:10px;
display:block;
}

input,select{
width:100%;
padding:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

button{
width:100%;
padding:14px;
margin-top:16px;
font-size:18px;
background:#2ecc71;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
}

.bedGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.bed{
background:#fafafa;
border-radius:10px;
padding:6px;
}

.bedTitle{
text-align:center;
font-weight:bold;
margin-bottom:4px;
}

.palletGrid{
display:grid;
grid-template-columns:repeat(39,1fr);
gap:2px;
}

.pallet{
height:10px;
background:#ddd;
border-radius:2px;
}

.start{
background:#22c55e;
}

.mid{
background:#fde047;
}

.end{
background:#ef4444;
}

</style>
</head>

<body>

<header>🥬 レタス収穫ナビ</header>

<div class="container">

<div class="card">

<label>出荷ケース</label>
<input id="cases" type="number">

<label>収穫率 (%)</label>
<input id="rate" type="number" value="100">

<label>収穫開始ベット</label>
<select id="startBed">
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
<option>E</option>
<option>F</option>
</select>

<label>開始パレット</label>
<input id="startPallet" type="number" value="1" min="1" max="78">

<div class="grid2">

<div>
<label>Aベット</label>
<input id="A" type="number" value="20">
</div>

<div>
<label>Bベット</label>
<input id="B" type="number" value="20">
</div>

<div>
<label>Cベット</label>
<input id="C" type="number" value="20">
</div>

<div>
<label>Dベット</label>
<input id="D" type="number" value="20">
</div>

<div>
<label>Eベット</label>
<input id="E" type="number" value="20">
</div>

<div>
<label>Fベット</label>
<input id="F" type="number" value="20">
</div>

</div>

<button onclick="calc()">収穫計算</button>

</div>

<div class="card">

<div class="bedGrid">

<div id="Fbed" class="bed"></div>
<div id="Dbed" class="bed"></div>
<div id="Bbed" class="bed"></div>

<div id="Ebed" class="bed"></div>
<div id="Cbed" class="bed"></div>
<div id="Abed" class="bed"></div>

</div>

</div>

</div>

<script>

const order=["A","B","C","D","E","F"]
const bedMap=["F","D","B","E","C","A"]

function drawBeds(){

bedMap.forEach(b=>{

let html="<div class='bedTitle'>"+b+"</div><div class='palletGrid'>"

for(let i=40;i<=78;i++){
html+="<div class='pallet' id='"+b+"-"+i+"'></div>"
}

for(let i=1;i<=39;i++){
html+="<div class='pallet' id='"+b+"-"+i+"'></div>"
}

html+="</div>"

document.getElementById(b+"bed").innerHTML=html

})

}

drawBeds()

function reset(){

document.querySelectorAll(".pallet").forEach(p=>{
p.className="pallet"
})

}

function saveSettings(){

localStorage.setItem("rate",rate.value)
localStorage.setItem("startBed",startBed.value)
localStorage.setItem("startPallet",startPallet.value)

order.forEach(b=>{
localStorage.setItem(b,document.getElementById(b).value)
})

}

function loadSettings(){

if(localStorage.getItem("rate"))
rate.value=localStorage.getItem("rate")

if(localStorage.getItem("startBed"))
startBed.value=localStorage.getItem("startBed")

if(localStorage.getItem("startPallet"))
startPallet.value=localStorage.getItem("startPallet")

order.forEach(b=>{
let v=localStorage.getItem(b)
if(v) document.getElementById(b).value=v
})

}

loadSettings()

function calc(){

saveSettings()

reset()

let cases=Number(cases.value)
let rateVal=Number(rate.value)/100

let need=cases*12/rateVal

let bedIndex=order.indexOf(startBed.value)
let palletIndex=Number(startPallet.value)

let total=0
let startSet=false
let lastId=null

while(total<need){

let bed=order[bedIndex]
let per=Number(document.getElementById(bed).value)

let id=bed+"-"+palletIndex
let el=document.getElementById(id)

if(el){

lastId=id

if(!startSet){
el.classList.add("start")
startSet=true
}else{
el.classList.add("mid")
}

}

total+=per

palletIndex++

if(palletIndex>78){

palletIndex=1
bedIndex++

if(bedIndex>=order.length)
bedIndex=0

}

}

if(lastId){

let endEl=document.getElementById(lastId)
endEl.classList.remove("mid")
endEl.classList.add("end")

}

}

</script>

</body>
</html>
