<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🥬 収穫＆苗ナビ（完成版）</title>

<style>
body{font-family:-apple-system; margin:0; background:#eef2f3;}
header{background:#22c55e;color:white;text-align:center;padding:18px;font-size:24px;font-weight:bold;}
.container{padding:14px;}
.card{background:white;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 3px 8px rgba(0,0,0,0.08);}
label{font-weight:bold;font-size:14px;display:block;margin-top:8px;}
input{
    width:80%;
    max-width:300px;
    display:block;
    margin:0 auto 10px auto;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:14px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    margin-top:8px;
}
.secondary{background:#6b7280;}
.third{background:#2563eb;}

.startBox{
    font-size:19px;
    font-weight:bold;
    text-align:center;
    padding:12px;
    background:#ecfdf5;
    border-radius:10px;
    margin-top:8px;
    line-height:1.7;
}

.bedGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.bed{
    background:white;
    border-radius:12px;
    padding:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}
.bedTitle{text-align:center;font-weight:bold;margin-bottom:6px;}
.palletGrid{display:grid;grid-template-columns:1fr;gap:3px;}
.pallet{height:10px;border-radius:3px;}

.palletEven{background:#bfc7d1;}
.palletOdd{background:#e5e7eb;}
.middleMark{background:#a78bfa;}

.start{background:#22c55e !important;}
.mid{background:#fde047 !important;}
.end{background:#ef4444 !important;}
.startSelect{outline:2px solid #2563eb;}
.plantMark{box-shadow:inset 0 0 0 2px #10b981;}

.frontZone{background:#86efac !important;}
.backZone{background:#fca5a5 !important;}

.notice{display:none;color:#dc2626;font-size:13px;margin-top:4px;margin-bottom:8px;}

.tab{display:flex;margin-bottom:10px;gap:8px;}
.tab button{
    flex:1;
    padding:12px 10px;
    cursor:pointer;
    border:none;
    border-bottom:3px solid transparent;
    background:#f3f4f6;
    font-weight:bold;
    color:#1f2937;
    margin-top:0;
}
.tab button.active{
    border-bottom:3px solid #22c55e;
    background:#e0fdf4;
}
.tabcontent{display:none;}

.sectionTitle{
    font-size:18px;
    font-weight:bold;
    margin:8px 0 4px 0;
}
.smallText{
    font-size:14px;
    color:#374151;
    margin:0 0 8px 0;
}
.resultBox{
    margin-top:8px;
    padding:10px;
    border-radius:10px;
    background:#f0fdf4;
    font-weight:bold;
    text-align:center;
    white-space:pre-line;
}
.hiddenBlock{display:none;}
</style>
</head>
<body>
<header>🥬 収穫＆苗ナビ（完成版）</header>

<div class="container">

  <div class="tab">
    <button class="tablinks active" onclick="switchTab(event,'harvestTab')">収穫計算モード</button>
    <button class="tablinks" onclick="switchTab(event,'plantTab')">植苗計算モード</button>
  </div>

  <div id="harvestTab" class="tabcontent" style="display:block;">
    <div class="card">
      <label>出荷ケース</label>
      <input id="cases" type="number">

      <label>全体収穫率 (%)</label>
      <input id="rate" type="number" value="100" oninput="drawBeds()">
      <div id="overallRateNotice" class="notice">※全体収穫率と異なるベットがあります</div>

      <div class="startBox">
        選択位置: <span id="currentLabel">A-1</span><br>
        開始位置: <span id="startLabel">A-1</span><br>
        終了位置: <span id="endLabel">-</span>
      </div>

      <button class="secondary" onclick="setCurrentAsStart()">選択位置を開始位置にする</button>
      <button class="secondary" onclick="resetStartEnd()">開始位置・終了位置をリセット</button>
      <button onclick="calcHarvest()">収穫計算</button>
      <button class="secondary" onclick="toggleDetail1()">詳細設定</button>
      <button class="secondary" onclick="toggleDetail2()">さらに詳細設定</button>
      <button class="third" onclick="saveSettings()">設定保存</button>

      <div id="detail1"></div>
      <div id="detail2"></div>
    </div>
  </div>

  <div id="plantTab" class="tabcontent">
    <div class="card">
      <div class="sectionTitle">植苗計算モード</div>
      <p class="smallText">収穫計算で色が付いたパレット分をもとに、自動で必要苗数と1号棟パレット枚数を計算します。</p>

      <label>苗の収穫率 (%)</label>
      <input id="seedlingRate" type="number" value="100">

      <div id="plantTotalResult" class="resultBox">植える苗の総数: -
必要な苗数: -</div>

      <div style="margin-top:10px;">
        <button class="secondary" onclick="togglePlantDetail1()">苗の詳細設定</button>
        <div id="plantDetail1"></div>
      </div>

      <div style="margin-top:10px;">
        <label>1号棟パレット3枚のうち、60個植えの枚数</label>
        <input id="special60" type="number" value="0" min="0" max="3">
        <button onclick="calcSpecial()">必要な1号棟パレット枚数を計算</button>
        <div id="specialResult" class="resultBox">必要な1号棟パレット枚数: -</div>
      </div>
    </div>
  </div>

  <div class="bedGrid">
    <div id="Fbed" class="bed"></div>
    <div id="Dbed" class="bed"></div>
    <div id="Bbed" class="bed"></div>
    <div id="Ebed" class="bed"></div>
    <div id="Cbed" class="bed"></div>
    <div id="Abed" class="bed"></div>
  </div>

</div>

<script>
const order = ["A","B","C","D","E","F"];
const bedMap = ["F","D","B","E","C","A"];

let startBed = "A";
let startPallet = 1;
let currentBed = "A";
let currentPallet = 1;
let detail1 = false;
let detail2 = false;
let plantDetail1 = false;
let calcMode = "harvest";

function switchTab(evt, mode){
  document.querySelectorAll(".tabcontent").forEach(tc => tc.style.display = "none");
  document.querySelectorAll(".tablinks").forEach(tb => tb.classList.remove("active"));
  document.getElementById(mode).style.display = "block";
  evt.currentTarget.classList.add("active");
  calcMode = (mode === "harvestTab") ? "harvest" : "plant";
  drawBeds();
}

function toggleDetail1(){
  detail1 = !detail1;
  drawSettings();
  loadSettings();
  drawBeds();
}

function toggleDetail2(){
  detail2 = !detail2;
  drawSettings();
  loadSettings();
  drawBeds();
}

function togglePlantDetail1(){
  plantDetail1 = !plantDetail1;
  drawPlantSettings();
  loadSettings();
  drawBeds();
}

function updateHarvestSplitVisibility(b){
  const checked = document.getElementById(b + "_useSplit")?.checked;
  const block = document.getElementById(b + "_harvestSplitBlock");
  const notice = document.getElementById(b + "_notice");
  if(block) block.style.display = checked ? "block" : "none";
  if(notice) notice.style.display = checked ? "block" : "none";
}

function updatePlantSplitVisibility(b){
  const checked = document.getElementById(b + "_useSplitPlant")?.checked;
  const block = document.getElementById(b + "_plantSplitBlock");
  const notice = document.getElementById(b + "_plant_notice");
  if(block) block.style.display = checked ? "block" : "none";
  if(notice) notice.style.display = checked ? "block" : "none";
}

function drawSettings(){
  let html1 = "";
  let html2 = "";

  if(detail1){
    order.forEach(b => {
      html1 += `
        <h3>${b}ベット</h3>
        <label>収穫用 1パレット数</label>
        <input id="${b}_single" type="number" value="20" oninput="drawBeds()">
      `;
    });
  }

  if(detail2){
    order.forEach(b => {
      html2 += `
        <h3>${b}ベット</h3>

        <label>収穫率 (%)</label>
        <input id="${b}_rate" type="number" value="" placeholder="空欄なら全体収穫率" oninput="drawBeds()">
        <div id="${b}_rate_notice" class="notice">※このベットは全体収穫率と異なります</div>

        <div style="margin-bottom:10px;">
          <label style="display:block;">
            <input type="checkbox" id="${b}_useSplit" onchange="updateHarvestSplitVisibility('${b}');drawBeds();">
            手前奥計算を使う
          </label>
          <div id="${b}_notice" class="notice">※手前奥計算が有効のため、下の設定で計算します</div>
        </div>

        <div id="${b}_harvestSplitBlock" class="hiddenBlock">
          <label>収穫モードの手前パレット数</label>
          <input id="${b}_splitHarvest" type="number" value="30" oninput="drawBeds()">

          <label>手前収穫数</label>
          <input id="${b}_front" type="number" value="20" oninput="drawBeds()">

          <label>奥収穫数</label>
          <input id="${b}_back" type="number" value="16" oninput="drawBeds()">
        </div>
      `;
    });
  }

  document.getElementById("detail1").innerHTML = html1;
  document.getElementById("detail2").innerHTML = html2;

  setTimeout(() => {
    order.forEach(b => updateHarvestSplitVisibility(b));
  }, 0);
}

function drawPlantSettings(){
  let html = "";

  if(plantDetail1){
    order.forEach(b => {
      html += `
        <h3>${b}ベット</h3>

        <label>1パレット苗数</label>
        <input id="${b}_singlePlant" type="number" value="20" oninput="drawBeds()">

        <div style="margin-bottom:10px;">
          <label style="display:block;">
            <input type="checkbox" id="${b}_useSplitPlant" onchange="updatePlantSplitVisibility('${b}');drawBeds();">
            手前奥計算を使う
          </label>
          <div id="${b}_plant_notice" class="notice">※手前奥計算が有効のため、下の設定で計算します</div>
        </div>

        <div id="${b}_plantSplitBlock" class="hiddenBlock">
          <label>植苗モードの手前パレット数</label>
          <input id="${b}_splitPlant" type="number" value="30" oninput="drawBeds()">

          <label>手前苗数</label>
          <input id="${b}_frontPlant" type="number" value="20" oninput="drawBeds()">

          <label>奥苗数</label>
          <input id="${b}_backPlant" type="number" value="16" oninput="drawBeds()">
        </div>
      `;
    });
  }

  document.getElementById("plantDetail1").innerHTML = html;

  setTimeout(() => {
    order.forEach(b => updatePlantSplitVisibility(b));
  }, 0);
}

function getHarvestResultIds(){
  let saved = localStorage.getItem("lettuceHarvestResult");
  if(!saved) return [];
  try{
    let arr = JSON.parse(saved);
    return Array.isArray(arr) ? arr : [];
  }catch(e){
    return [];
  }
}

function getPlantMarkedIds(){
  let saved = localStorage.getItem("lettucePlantMarked");
  if(!saved) return [];
  try{
    let arr = JSON.parse(saved);
    return Array.isArray(arr) ? arr : [];
  }catch(e){
    return [];
  }
}

function drawBeds(){
  let hasDifferentBedRate = false;

  bedMap.forEach(b => {
    let html = "<div class='bedTitle'>" + b + "</div><div class='palletGrid'>";

    let useSplitHarvest = document.getElementById(b + "_useSplit");
    let useSplitPlant = document.getElementById(b + "_useSplitPlant");

    let rateInput = document.getElementById(b + "_rate");
    let rateNotice = document.getElementById(b + "_rate_notice");
    if(rateNotice){
      let overallRate = Number(document.getElementById("rate").value || 100);
      let hasBedRate = rateInput && rateInput.value.trim() !== "";
      let bedRate = hasBedRate ? Number(rateInput.value) : overallRate;
      let isDifferent = hasBedRate && bedRate !== overallRate;
      rateNotice.style.display = isDifferent ? "block" : "none";
      if(isDifferent) hasDifferentBedRate = true;
    }

    let split = 0;
    if(calcMode === "harvest"){
      split = (useSplitHarvest && useSplitHarvest.checked)
        ? Number(document.getElementById(b + "_splitHarvest")?.value || 0)
        : 0;
    } else {
      split = (useSplitPlant && useSplitPlant.checked)
        ? Number(document.getElementById(b + "_splitPlant")?.value || 0)
        : 0;
    }

    for(let i = 39; i >= 1; i--){
      let cls = "pallet";
      cls += (i % 2 === 0) ? " palletEven" : " palletOdd";
      if(i === Math.ceil(39/2)) cls += " middleMark";
      if(split > 0){
        cls += (i <= split) ? " frontZone" : " backZone";
      }
      html += `<div class="${cls}" onclick="setStart('${b}',${i})" id="${b}-${i}"></div>`;
    }

    html += "</div>";
    document.getElementById(b + "bed").innerHTML = html;
  });

  let overallRateNotice = document.getElementById("overallRateNotice");
  if(overallRateNotice){
    overallRateNotice.style.display = hasDifferentBedRate ? "block" : "none";
  }

  applySavedMarks();
}

function applySavedMarks(){
  document.querySelectorAll(".pallet").forEach(el=>{
    el.classList.remove("start","mid","end","plantMark","startSelect");
  });

  let harvestIds = getHarvestResultIds();
  harvestIds.forEach((id, idx) => {
    let el = document.getElementById(id);
    if(!el) return;
    if(idx === 0) el.classList.add("start");
    else if(idx === harvestIds.length - 1) el.classList.add("end");
    else el.classList.add("mid");
  });

  let plantIds = getPlantMarkedIds();
  plantIds.forEach(id => {
    let el = document.getElementById(id);
    if(el) el.classList.add("plantMark");
  });

  let selected = document.getElementById(currentBed + "-" + currentPallet);
  if(selected) selected.classList.add("startSelect");

  document.getElementById("currentLabel").innerText = currentBed + "-" + currentPallet;
  document.getElementById("startLabel").innerText = startBed + "-" + startPallet;

  if(harvestIds.length > 0){
    document.getElementById("endLabel").innerText = harvestIds[harvestIds.length - 1];
  }else{
    document.getElementById("endLabel").innerText = "-";
  }
}

function setStart(b, p){
  document.querySelectorAll(".startSelect").forEach(el => el.classList.remove("startSelect"));
  let el = document.getElementById(b + "-" + p);
  if(el) el.classList.add("startSelect");

  currentBed = b;
  currentPallet = p;
  document.getElementById("currentLabel").innerText = b + "-" + p;
}

function setCurrentAsStart(){
  startBed = currentBed;
  startPallet = currentPallet;
  document.getElementById("startLabel").innerText = startBed + "-" + startPallet;
}

function resetStartEnd(){
  startBed = "A";
  startPallet = 1;
  document.getElementById("startLabel").innerText = "A-1";
  document.getElementById("endLabel").innerText = "-";
  localStorage.removeItem("lettuceHarvestResult");
  localStorage.removeItem("lettucePlantMarked");
  drawBeds();
}

function getHarvestYield(b, p){
  let rateInput = document.getElementById(b + "_rate");
  let rate = (rateInput && rateInput.value.trim() !== "")
    ? Number(rateInput.value) / 100
    : Number(document.getElementById("rate").value || 100) / 100;

  let useSplit = document.getElementById(b + "_useSplit")?.checked;

  if(useSplit){
    let split = Number(document.getElementById(b + "_splitHarvest")?.value || 0);
    let front = Number(document.getElementById(b + "_front")?.value || 20);
    let back = Number(document.getElementById(b + "_back")?.value || 16);
    return (p <= split ? front : back) * rate;
  }

  let single = Number(document.getElementById(b + "_single")?.value || 20);
  return single * rate;
}

function getPlantYield(b, p){
  let useSplit = document.getElementById(b + "_useSplitPlant")?.checked;

  if(useSplit){
    let split = Number(document.getElementById(b + "_splitPlant")?.value || 0);
    let frontPlant = Number(document.getElementById(b + "_frontPlant")?.value || 20);
    let backPlant = Number(document.getElementById(b + "_backPlant")?.value || 16);
    return p <= split ? frontPlant : backPlant;
  }

  return Number(document.getElementById(b + "_singlePlant")?.value || 20);
}

function calcHarvest(){
  localStorage.removeItem("lettucePlantMarked");

  startBed = currentBed;
  startPallet = currentPallet;
  document.getElementById("startLabel").innerText = startBed + "-" + startPallet;

  let cases = Number(document.getElementById("cases").value || 0);
  let overallRate = Number(document.getElementById("rate").value || 100) / 100;

  if(cases <= 0 || overallRate <= 0){
    alert("出荷ケースと全体収穫率を確認してください");
    return;
  }

  let need = cases * 12 / overallRate;
  let bedIndex = order.indexOf(startBed);
  let palletIndex = startPallet;
  let total = 0;
  let resultIds = [];
  let loopGuard = 0;
  const maxLoop = order.length * 39 * 10;

  while(total < need && loopGuard < maxLoop){
    let bed = order[bedIndex];
    let yieldValue = getHarvestYield(bed, palletIndex) * 2;
    let id = bed + "-" + palletIndex;

    resultIds.push(id);
    total += yieldValue;
    palletIndex++;

    if(palletIndex > 39){
      palletIndex = 1;
      bedIndex++;
      if(bedIndex >= order.length) bedIndex = 0;
    }

    loopGuard++;
  }

  localStorage.setItem("lettuceHarvestResult", JSON.stringify(resultIds));
  drawBeds();
}

function calcPlantCore(){
  let harvestIds = getHarvestResultIds();

  if(harvestIds.length === 0){
    return { ok:false, message:"先に収穫計算をしてください" };
  }

  let totalPlantNeed = 0;

  harvestIds.forEach(id => {
    let [b, pStr] = id.split("-");
    let p = Number(pStr);
    totalPlantNeed += getPlantYield(b, p) * 2;
  });

  let seedlingRate = Number(document.getElementById("seedlingRate").value || 100) / 100;
  if(seedlingRate <= 0){
    return { ok:false, message:"苗の収穫率を確認してください" };
  }

  let requiredSeedlings = totalPlantNeed / seedlingRate;

  localStorage.setItem("lettucePlantMarked", JSON.stringify(harvestIds));
  document.getElementById("plantTotalResult").innerText =
    "植える苗の総数: " + Math.ceil(totalPlantNeed) + "\n" +
    "必要な苗数: " + Math.ceil(requiredSeedlings);

  drawBeds();

  return {
    ok:true,
    totalPlantNeed: Math.ceil(totalPlantNeed),
    requiredSeedlings: Math.ceil(requiredSeedlings)
  };
}

function calcSpecial(){
  let plantResult = calcPlantCore();

  if(!plantResult.ok){
    document.getElementById("specialResult").innerText = plantResult.message;
    alert(plantResult.message);
    return;
  }

  let totalSeedlings = plantResult.requiredSeedlings;

  let n60 = Number(document.getElementById("special60").value || 0);
  if(n60 < 0) n60 = 0;
  if(n60 > 3) n60 = 3;

  let cycle = [];
  for(let i=0;i<n60;i++) cycle.push(60);
  for(let i=0;i<3-n60;i++) cycle.push(120);

  let used = 0;
  let sum = 0;
  let index = 0;

  while(sum < totalSeedlings){
    sum += cycle[index];
    used++;
    index++;
    if(index >= cycle.length) index = 0;
  }

  document.getElementById("specialResult").innerText =
    "必要な1号棟パレット枚数: " + used + "\n" +
    "（3枚ごとの並び: " + cycle.join("・") + " を繰り返して計算）";
}

function saveSettings(){
  let data = {
    cases: document.getElementById("cases")?.value || "",
    rate: document.getElementById("rate")?.value || "100",
    seedlingRate: document.getElementById("seedlingRate")?.value || "100",
    startBed,
    startPallet,
    currentBed,
    currentPallet,
    special60: document.getElementById("special60")?.value || "0",
    beds: {}
  };

  order.forEach(b => {
    data.beds[b] = {
      single: document.getElementById(b + "_single")?.value || 20,
      singlePlant: document.getElementById(b + "_singlePlant")?.value || 20,
      splitHarvest: document.getElementById(b + "_splitHarvest")?.value || 30,
      splitPlant: document.getElementById(b + "_splitPlant")?.value || 30,
      front: document.getElementById(b + "_front")?.value || 20,
      back: document.getElementById(b + "_back")?.value || 16,
      useSplit: document.getElementById(b + "_useSplit")?.checked || false,
      rate: document.getElementById(b + "_rate")?.value || "",
      useSplitPlant: document.getElementById(b + "_useSplitPlant")?.checked || false,
      frontPlant: document.getElementById(b + "_frontPlant")?.value || 20,
      backPlant: document.getElementById(b + "_backPlant")?.value || 16
    };
  });

  localStorage.setItem("lettuceApp", JSON.stringify(data));
  alert("設定保存しました");
}

function loadSettings(){
  let data = localStorage.getItem("lettuceApp");
  if(!data) return;

  try{
    data = JSON.parse(data);
  }catch(e){
    return;
  }

  if(document.getElementById("cases")) document.getElementById("cases").value = data.cases ?? "";
  if(document.getElementById("rate")) document.getElementById("rate").value = data.rate ?? "100";
  if(document.getElementById("seedlingRate")) document.getElementById("seedlingRate").value = data.seedlingRate ?? "100";
  if(document.getElementById("special60")) document.getElementById("special60").value = data.special60 ?? "0";

  startBed = data.startBed || "A";
  startPallet = data.startPallet || 1;
  currentBed = data.currentBed || startBed;
  currentPallet = data.currentPallet || startPallet;

  document.getElementById("currentLabel").innerText = currentBed + "-" + currentPallet;
  document.getElementById("startLabel").innerText = startBed + "-" + startPallet;

  order.forEach(b => {
    let d = data.beds?.[b];
    if(!d) return;

    if(document.getElementById(b + "_single")) document.getElementById(b + "_single").value = d.single;
    if(document.getElementById(b + "_singlePlant")) document.getElementById(b + "_singlePlant").value = d.singlePlant;
    if(document.getElementById(b + "_splitHarvest")) document.getElementById(b + "_splitHarvest").value = d.splitHarvest;
    if(document.getElementById(b + "_splitPlant")) document.getElementById(b + "_splitPlant").value = d.splitPlant;
    if(document.getElementById(b + "_front")) document.getElementById(b + "_front").value = d.front;
    if(document.getElementById(b + "_back")) document.getElementById(b + "_back").value = d.back;
    if(document.getElementById(b + "_useSplit")) document.getElementById(b + "_useSplit").checked = d.useSplit;
    if(document.getElementById(b + "_rate")) document.getElementById(b + "_rate").value = d.rate ?? "";
    if(document.getElementById(b + "_useSplitPlant")) document.getElementById(b + "_useSplitPlant").checked = d.useSplitPlant;
    if(document.getElementById(b + "_frontPlant")) document.getElementById(b + "_frontPlant").value = d.frontPlant;
    if(document.getElementById(b + "_backPlant")) document.getElementById(b + "_backPlant").value = d.backPlant;
  });

  setTimeout(() => {
    order.forEach(b => {
      updateHarvestSplitVisibility(b);
      updatePlantSplitVisibility(b);
    });
  }, 0);
}

window.onload = () => {
  drawSettings();
  drawPlantSettings();
  loadSettings();
  drawBeds();
};
</script>
</body>
</html>
